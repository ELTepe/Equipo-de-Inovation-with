<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God Eye| Monitoreo en Tiempo Real</title>
    <style>
        :root {
            --primary-black: #000000;
            --accent-red: #e63946;
            --accent-red-hover: #c1272d;
            --bg-white: #ffffff;
            --gray-light: #f8f9fa;
            --gray-medium: #dee2e6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-white); color: var(--primary-black); }

        /* Header & Dropdown Navigation */
        .header { 
            background-color: var(--primary-black); color: white; padding: 15px 40px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .nav-container { display: flex; }
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { 
            background-color: var(--accent-red); color: white; padding: 10px 25px; 
            font-size: 14px; font-weight: bold; border: none; cursor: pointer; border-radius: 4px;
        }
        .dropdown-content {
            display: none; position: absolute; right: 0; background-color: var(--primary-black);
            min-width: 220px; box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
            border-top: 3px solid var(--accent-red);
        }
        .dropdown-content a {
            color: white; padding: 14px 20px; text-decoration: none; display: block;
            font-size: 13px; border-bottom: 1px solid #222; transition: 0.3s;
        }
        .dropdown-content a:hover { background-color: var(--accent-red); }
        .dropdown:hover .dropdown-content { display: block; }

        /* Content Layout */
        .content-section { display: none; padding: 30px; max-width: 1300px; margin: 0 auto; }
        .content-section.active { display: block; }

        /* Dashboard Grid (Panel Principal) */
        .dashboard-main-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-top: 20px;
        }
        .zone-column {
            background: var(--gray-light); border: 2px solid var(--primary-black); border-radius: 8px; padding: 15px;
        }
        .zone-header {
            text-align: center; padding-bottom: 10px; border-bottom: 2px solid var(--primary-black);
            margin-bottom: 15px; font-weight: 900; letter-spacing: 1px;
        }
        .panel-bay-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: white; border: 1px solid var(--gray-medium);
            margin-bottom: 10px; border-radius: 4px;
        }
        .panel-bay-row span { font-weight: bold; font-size: 14px; }
        .panel-time { font-family: monospace; font-size: 18px; color: var(--accent-red); }

        /* Vista de Zona Específica (Bahías Grandes) */
        .bays-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .bay-card { border: 2px solid var(--primary-black); padding: 25px; border-radius: 8px; text-align: center; }
        .bay-timer { font-family: monospace; font-size: 40px; font-weight: bold; margin: 15px 0; }
        .status-badge { font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 3px; background: #eee; margin-bottom: 10px; display: inline-block; }
        .running { background: #ffe3e3; color: var(--accent-red); }

        /* Botones */
        .btn { 
            padding: 12px; border: none; background: var(--accent-red); color: white; 
            font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; text-transform: uppercase;
        }
        .btn:hover { background: var(--accent-red-hover); }
        .btn-stop { background: var(--primary-black); }

        /* Tabla de Historial */
        .history-box { margin-top: 30px; border: 1px solid var(--primary-black); border-radius: 8px; overflow: hidden; }
        .history-title { background: var(--primary-black); color: white; padding: 10px 20px; font-size: 14px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--gray-medium); font-size: 13px; }
        th { background: var(--gray-light); }

        /* Formulario Registro/Login */
        .form-container { max-width: 400px; margin: 100px auto; padding: 40px; border: 2px solid var(--primary-black); border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 12px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--gray-medium); border-radius: 4px; }
    </style>
</head>
<body>

    <header class="header">
        <h1>God Eye <span style="color:var(--accent-red)">SYSTEM</span></h1>
        <div class="nav-container">
            <div class="dropdown">
                <button class="dropbtn">MENÚ DE NAVEGACIÓN ☰</button>
                <div class="dropdown-content">
                    <a href="#" onclick="showTab('dashboard')">Panel Principal (Todas las Bahías)</a>
                    <a href="#" onclick="showTab('mantenimiento')">Sección Mantenimiento</a>
                    <a href="#" onclick="showTab('choques')">Sección Choques</a>
                    <a href="#" onclick="showTab('lavado')">Sección Lavado</a>
                    <a href="#" onclick="showTab('registro')">Registrar Usuario</a>
                    <a href="#" onclick="showTab('inicio')">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </header>

    <div class="content-section" id="registro">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 20px;">Nuevo Usuario</h2>
            <div class="form-group"><label>Nombre</label><input type="text"></div>
            <div class="form-group"><label>Email</label><input type="email"></div>
            <button class="btn" onclick="showTab('dashboard')">Crear Cuenta</button>
        </div>
    </div>

    <div class="content-section active" id="inicio">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 20px;">Acceso Halcón</h2>
            <div class="form-group"><label>Email</label><input type="email"></div>
            <div class="form-group"><label>Password</label><input type="password"></div>
            <button class="btn" onclick="showTab('dashboard')">Ingresar al Sistema</button>
        </div>
    </div>

    <div class="content-section" id="dashboard">
        <h2 style="margin-bottom: 20px; border-left: 5px solid var(--accent-red); padding-left: 15px;">MONITOREO GLOBAL DE BAHÍAS</h2>
        <h3 id="bay-counter" style="margin-bottom:15px;"></h3>
        <div class="dashboard-main-grid">
            <div class="zone-column">
                <div class="zone-header">MANTENIMIENTO</div>
                <div id="panel-list-mantenimiento"></div>
            </div>
            <div class="zone-column">
                <div class="zone-header">CHOQUES</div>
                <div id="panel-list-choques"></div>
            </div>
            <div class="zone-column">
                <div class="zone-header">LAVADO</div>
                <div id="panel-list-lavado"></div>
            </div>
        </div>
    </div>

    <div class="content-section" id="service-view">
        <h2 id="view-title" style="margin-bottom: 25px;">Zona</h2>
        <div class="bays-grid" id="bays-grid-view"></div>

        <div class="history-box">
            <div class="history-title" id="history-zone-label">Historial</div>

            <button class="btn" onclick="clearHistory()" style="margin:10px; background:#444;">
                Limpiar Historial
            </button>

            <button class="btn" onclick="exportHistory()" style="margin:10px; background:#2c7;">
                Exportar Excel
            </button>

            <table>
                <thead>
                    <tr><th>Bahía</th><th>Acción</th><th>Hora</th><th>Tiempo Acum.</th></tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const alarm = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
        const state = {
            mantenimiento: { name: "Mantenimiento", bays: { B1:0, B2:0, B3:0, B4:0 }, running: { B1:false, B2:false, B3:false, B4:false }, history: [], lastReset: Date.now() },
            choques: { name: "Choques", bays: { B1:0, B2:0, B3:0, B4:0 }, running: { B1:false, B2:false, B3:false, B4:false }, history: [], lastReset: Date.now() },
            lavado: { name: "Lavado", bays: { B1:0, B2:0, B3:0, B4:0 }, running: { B1:false, B2:false, B3:false, B4:false }, history: [], lastReset: Date.now() },
        };

        let currentZoneKey = '';
        const intervals = {};

        function saveState(){
            localStorage.setItem("godEyeState", JSON.stringify(state));
        }
        
        function checkHistoryReset(){
            const now = Date.now();
            const day = 24 * 60 * 60 * 1000;

            Object.keys(state).forEach(zoneKey => {

                const zone = state[zoneKey];

                if(now - zone.lastReset >= day){

                    zone.history = [];
                    zone.lastReset = now;

                }

            });

            saveState();
        }


        function formatTime(s) {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
        }

        function showTab(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            if (state[id]) {
                currentZoneKey = id;
                document.getElementById('service-view').classList.add('active');
                renderZoneView();
            } else {
                document.getElementById(id).classList.add('active');
                if(id === 'dashboard') renderDashboard();
            }
        }

        // Renderiza los tiempos de las 12 bahías en el Panel Principal
        function renderDashboard() {
            const zones = ['mantenimiento', 'choques', 'lavado'];
            zones.forEach(z => {
                const list = document.getElementById(`panel-list-${z}`);
                list.innerHTML = '';
                Object.keys(state[z].bays).forEach(bId => {
                    const row = document.createElement('div');
                    row.className = 'panel-bay-row';
                    if(state[z].running[bId]){
                        row.style.background = "#ffe3e3";
                    }

                    row.innerHTML = `
                        <span>Bahía ${bId.replace('B','')}</span>
                        <span class="panel-time" id="dash-timer-${z}-${bId}">${formatTime(state[z].bays[bId])}</span>
                    `;
                    list.appendChild(row);
                });
            });
            let total = 0;
            let active = 0;

            Object.keys(state).forEach(z=>{
                Object.keys(state[z].running).forEach(b=>{
                    total++;
                    if(state[z].running[b]) active++;
                });
            });

            const counter = document.getElementById("bay-counter");
            if(counter){
                counter.textContent = `Bahías ocupadas: ${active} / ${total}`;
            }
        }

        // Renderiza la vista de control de una zona específica
        function renderZoneView() {
            const zone = state[currentZoneKey];
            document.getElementById('view-title').textContent = `GESTIÓN DE ${zone.name.toUpperCase()}`;
            document.getElementById('history-zone-label').textContent = `LOG DE ACTIVIDAD: ${zone.name}`;
            const grid = document.getElementById('bays-grid-view');
            grid.innerHTML = '';

            Object.keys(zone.bays).forEach(bId => {
                const active = zone.running[bId];
                const card = document.createElement('div');
                card.className = 'bay-card';
                card.innerHTML = `
                    <span class="status-badge ${active ? 'running' : ''}">${active ? 'EN TIEMPO MUERTO' : 'ESTACIONADO'}</span>
                    <h3>Bahía ${bId.replace('B','')}</h3>
                    <div class="bay-timer" id="view-timer-${bId}">${formatTime(zone.bays[bId])}</div>
                    <button class="btn ${active ? 'btn-stop' : ''}" onclick="toggleTimer('${bId}')">
                        ${active ? 'Pausar' : 'Iniciar'}
                    </button>
                    
                    <button class="btn" onclick="resetTimer('${bId}')" style="margin-top:8px; background:#555;">
                        Reset
                        </button>
                `;
                grid.appendChild(card);
            });
            renderHistory();
        }

        function toggleTimer(bId) {
            const zone = state[currentZoneKey];
            const now = new Date().toLocaleTimeString();


            if (!zone.running[bId]) {
                zone.running[bId] = true;
                zone.history.push({ bay: bId, action: 'INICIO', time: now, total: formatTime(zone.bays[bId]) });
                saveState();
                intervals[`${currentZoneKey}-${bId}`] = setInterval(() => {
                    zone.bays[bId]++;
                    if(zone.bays[bId] === 900){
                        alarm.play();
                    }
                    // Actualizar vista de zona si está abierta
                    const vt = document.getElementById(`view-timer-${bId}`);
                    if (vt) vt.textContent = formatTime(zone.bays[bId]);
                    // Actualizar panel si está abierto (aunque esté en segundo plano se actualiza)
                    const dt = document.getElementById(`dash-timer-${currentZoneKey}-${bId}`);
                    if (dt) dt.textContent = formatTime(zone.bays[bId]);
                }, 1000);
            } else {
                zone.running[bId] = false;
                clearInterval(intervals[`${currentZoneKey}-${bId}`]);
                zone.history.push({ bay: bId, action: 'FIN', time: now, total: formatTime(zone.bays[bId]) });
                saveState();
            }
            renderZoneView();
        }

        function resetTimer(bId){
            const zone = state[currentZoneKey];
            const zoneKey = currentZoneKey;
            
            // si el tiempo ya es 0, no hacer nada
            if(zone.bays[bId] === 0){
                return;
            }
            // Detener timer si estaba corriendo
            if(zone.running[bId]){
                clearInterval(intervals[`${currentZoneKey}-${bId}`]);
                zone.running[bId] = false;
            }
            // Reiniciar tiempo
            zone.bays[bId] = 0;

            // Registrar en historial
            const now = new Date().toLocaleTimeString();
            zone.history.push({
                bay: bId,
                action: 'RESET',
                time: now,
                total: "00:00:00"
            });
            
            saveState();
            
            renderZoneView();
        }


        function renderHistory() {
            const body = document.getElementById('history-body');
            body.innerHTML = '';
            [...state[currentZoneKey].history].reverse().forEach(h => {
                body.innerHTML += `<tr>
                    <td><strong>${h.bay}</strong></td>
                    <td style="color:${h.action==='INICIO'?'#2ecc71':'#e63946'}">${h.action}</td>
                    <td>${h.time}</td>
                    <td>${h.total}</td>
                </tr>`;
            });
        }

        function clearHistory(){
            
            const zone = state[currentZoneKey];

            const confirmar = confirm("¿Seguro que quieres borrar todo el historial de esta zona?");

            if(!confirmar){
                return;
            }

    zone.history = [];

    saveState();

    renderHistory();
}


        // Cargar estado guardado si existe
        const savedState = localStorage.getItem("godEyeState");
        
        if(savedState){
            Object.assign(state, JSON.parse(savedState));
        }

        checkHistoryReset();

        // Inicializar el dashboard al cargar
        renderDashboard();
        
        function exportHistory(){

            const zone = state[currentZoneKey];

            let csv = "Bahia,Accion,Hora,Tiempo\n";

            zone.history.forEach(h=>{
                csv += `${h.bay},${h.action},${h.time},${h.total}\n`;
            });

            const blob = new Blob([csv], {type:"text/csv"});
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = `historial-${currentZoneKey}.csv`;
            a.click();
        }

    </script>
</body>
</html>
