<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God Eye | Monitoreo Real</title>
    <style>
        /* [Se mantiene tu CSS original igual] */
        :root {
            --primary-black: #000000;
            --accent-red: #e63946;
            --accent-red-hover: #c1272d;
            --bg-white: #ffffff;
            --gray-light: #f8f9fa;
            --gray-medium: #dee2e6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-white); color: var(--primary-black); }
        .header { background-color: var(--primary-black); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-container { display: flex; }
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { background-color: var(--accent-red); color: white; padding: 10px 25px; font-size: 14px; font-weight: bold; border: none; cursor: pointer; border-radius: 4px; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: var(--primary-black); min-width: 220px; box-shadow: 0px 8px 16px rgba(0,0,0,0.3); border-top: 3px solid var(--accent-red); }
        .dropdown-content a { color: white; padding: 14px 20px; text-decoration: none; display: block; font-size: 13px; border-bottom: 1px solid #222; transition: 0.3s; }
        .dropdown-content a:hover { background-color: var(--accent-red); }
        .dropdown:hover .dropdown-content { display: block; }
        .content-section { display: none; padding: 30px; max-width: 1300px; margin: 0 auto; }
        .content-section.active { display: block; }
        .dashboard-main-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-top: 20px; }
        .zone-column { background: var(--gray-light); border: 2px solid var(--primary-black); border-radius: 8px; padding: 15px; }
        .zone-header { text-align: center; padding-bottom: 10px; border-bottom: 2px solid var(--primary-black); margin-bottom: 15px; font-weight: 900; letter-spacing: 1px; }
        .panel-bay-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: white; border: 1px solid var(--gray-medium); margin-bottom: 10px; border-radius: 4px; }
        .panel-bay-row span { font-weight: bold; font-size: 14px; }
        .panel-time { font-family: monospace; font-size: 18px; color: var(--accent-red); }
        .bays-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .bay-card { border: 2px solid var(--primary-black); padding: 25px; border-radius: 8px; text-align: center; }
        .bay-timer { font-family: monospace; font-size: 40px; font-weight: bold; margin: 15px 0; }
        .status-badge { font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 3px; background: #eee; margin-bottom: 10px; display: inline-block; }
        .running { background: #ffe3e3; color: var(--accent-red); }
        .btn { padding: 12px; border: none; background: var(--accent-red); color: white; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; text-transform: uppercase; }
        .btn:hover { background: var(--accent-red-hover); }
        .btn-stop { background: var(--primary-black); }
        .history-box { margin-top: 30px; border: 1px solid var(--primary-black); border-radius: 8px; overflow: hidden; }
        .history-title { background: var(--primary-black); color: white; padding: 10px 20px; font-size: 14px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--gray-medium); font-size: 13px; }
        th { background: var(--gray-light); }
        .form-container { max-width: 400px; margin: 100px auto; padding: 40px; border: 2px solid var(--primary-black); border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 12px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--gray-medium); border-radius: 4px; }
    </style>
</head>
<body>

    <header class="header">
        <h1>God Eye <span style="color:var(--accent-red)">SYSTEM</span></h1>
        <div class="nav-container">
            <div class="dropdown">
                <button class="dropbtn">MENÚ DE NAVEGACIÓN ☰</button>
                <div class="dropdown-content">
                    <a href="#" onclick="showTab('dashboard')">Panel Principal</a>
                    <a href="#" onclick="showTab('mantenimiento')">Sección Mantenimiento</a>
                    <a href="#" onclick="showTab('choques')">Sección Choques</a>
                    <a href="#" onclick="showTab('lavado')">Sección Lavado</a>
                    <a href="#" onclick="showTab('inicio')">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </header>

    <div class="content-section active" id="inicio">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 20px;">Acceso Halcón</h2>
            <div class="form-group"><label>Email</label><input type="email"></div>
            <div class="form-group"><label>Password</label><input type="password"></div>
            <button class="btn" onclick="showTab('dashboard')">Ingresar al Sistema</button>
        </div>
    </div>

    <div class="content-section" id="dashboard">
        <h2 style="margin-bottom: 20px; border-left: 5px solid var(--accent-red); padding-left: 15px;">MONITOREO GLOBAL</h2>
        <h3 id="bay-counter"></h3>
        <div class="dashboard-main-grid">
            <div class="zone-column"><div class="zone-header">MANTENIMIENTO</div><div id="panel-list-mantenimiento"></div></div>
            <div class="zone-column"><div class="zone-header">CHOQUES</div><div id="panel-list-choques"></div></div>
            <div class="zone-column"><div class="zone-header">LAVADO</div><div id="panel-list-lavado"></div></div>
        </div>
    </div>

    <div class="content-section" id="service-view">
        <h2 id="view-title">Zona</h2>
        <div class="bays-grid" id="bays-grid-view"></div>
        <div class="history-box">
            <div class="history-title" id="history-zone-label">Historial</div>
            <div style="padding: 10px;">
                <button class="btn" onclick="exportHistory()" style="width: auto; background:#2c7; padding: 10px 20px;">Exportar Excel</button>
                <button class="btn" onclick="clearHistory()" style="width: auto; background:#444; padding: 10px 20px;">Limpiar Historial</button>
            </div>
            <table>
                <thead><tr><th>Bahía</th><th>Acción</th><th>Hora</th><th>Tiempo Acum.</th></tr></thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const alarm = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
        
        let state = {
            mantenimiento: { name: "Mantenimiento", bays: { B1:0, B2:0, B3:0, B4:0 }, running: { B1:false, B2:false, B3:false, B4:false }, history: [] },
            choques: { name: "Choques", bays: { B1:0, B2:0, B3:0, B4:0 }, running: { B1:false, B2:false, B3:false, B4:false }, history: [] },
            lavado: { name: "Lavado", bays: { B1:0, B2:0, B3:0, B4:0 }, running: { B1:false, B2:false, B3:false, B4:false }, history: [] },
        };

        const intervals = {}; // Aquí guardaremos los IDs de los intervalos
        let currentZoneKey = '';

        function formatTime(s) {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
        }

        function showTab(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            if (state[id]) {
                currentZoneKey = id;
                document.getElementById('service-view').classList.add('active');
                renderZoneView();
            } else {
                document.getElementById(id).classList.add('active');
                if(id === 'dashboard') renderDashboard();
            }
        }

        function toggleTimer(bId) {
            const zone = state[currentZoneKey];
            const intervalKey = `${currentZoneKey}-${bId}`;

            if (!zone.running[bId]) {
                // INICIAR
                zone.running[bId] = true;
                zone.history.push({ bay: bId, action: 'INICIO', time: new Date().toLocaleTimeString(), total: formatTime(zone.bays[bId]) });
                
                intervals[intervalKey] = setInterval(() => {
                    state[currentZoneKey].bays[bId]++;
                    if(state[currentZoneKey].bays[bId] === 900) alarm.play();
                    updateDisplay(bId);
                }, 1000);
            } else {
                // PAUSAR
                zone.running[bId] = false;
                clearInterval(intervals[intervalKey]);
                delete intervals[intervalKey];
                zone.history.push({ bay: bId, action: 'FIN', time: new Date().toLocaleTimeString(), total: formatTime(zone.bays[bId]) });
            }
            saveState();
            renderZoneView();
        }

        function updateDisplay(bId) {
            const timeStr = formatTime(state[currentZoneKey].bays[bId]);
            const viewTimer = document.getElementById(`view-timer-${bId}`);
            if (viewTimer) viewTimer.textContent = timeStr;
        }

        function resetTimer(bId) {
            const intervalKey = `${currentZoneKey}-${bId}`;
            clearInterval(intervals[intervalKey]);
            delete intervals[intervalKey];
            
            state[currentZoneKey].bays[bId] = 0;
            state[currentZoneKey].running[bId] = false;
            saveState();
            renderZoneView();
        }

        function renderDashboard() {
            ['mantenimiento', 'choques', 'lavado'].forEach(z => {
                const list = document.getElementById(`panel-list-${z}`);
                list.innerHTML = '';
                Object.keys(state[z].bays).forEach(bId => {
                    const row = document.createElement('div');
                    row.className = 'panel-bay-row';
                    if(state[z].running[bId]) row.style.background = "#ffe3e3";
                    row.innerHTML = `<span>Bahía ${bId.slice(1)}</span><span class="panel-time">${formatTime(state[z].bays[bId])}</span>`;
                    list.appendChild(row);
                });
            });
        }

        function renderZoneView() {
            const zone = state[currentZoneKey];
            document.getElementById('view-title').textContent = `GESTIÓN DE ${zone.name.toUpperCase()}`;
            const grid = document.getElementById('bays-grid-view');
            grid.innerHTML = '';

            Object.keys(zone.bays).forEach(bId => {
                const active = zone.running[bId];
                const card = document.createElement('div');
                card.className = 'bay-card';
                card.innerHTML = `
                    <span class="status-badge ${active ? 'running' : ''}">${active ? 'EN TIEMPO MUERTO' : 'ESTACIONADO'}</span>
                    <h3>Bahía ${bId.slice(1)}</h3>
                    <div class="bay-timer" id="view-timer-${bId}">${formatTime(zone.bays[bId])}</div>
                    <button class="btn ${active ? 'btn-stop' : ''}" onclick="toggleTimer('${bId}')">${active ? 'Pausar' : 'Iniciar'}</button>
                    <button class="btn" onclick="resetTimer('${bId}')" style="margin-top:8px; background:#555;">Reset</button>
                `;
                grid.appendChild(card);
            });
            renderHistory();
        }

        function renderHistory() {
            const body = document.getElementById('history-body');
            body.innerHTML = state[currentZoneKey].history.slice().reverse().map(h => `
                <tr><td><strong>${h.bay}</strong></td><td style="color:${h.action==='INICIO'?'#2ecc71':'#e63946'}">${h.action}</td><td>${h.time}</td><td>${h.total}</td></tr>
            `).join('');
        }

        function saveState() { localStorage.setItem("godEyeState", JSON.stringify(state)); }
        
        // Carga inicial
        const saved = localStorage.getItem("godEyeState");
        if(saved) state = JSON.parse(saved);
        renderDashboard();
    </script>
</body>
</html>
